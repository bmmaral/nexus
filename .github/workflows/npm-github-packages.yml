name: npm-github-packages

# Publishes `packaging/npm` to GitHub Packages as @bmmaral/gittriage.
# Requires a GitHub Release with matching binaries (see release workflow).

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://npm.pkg.github.com
          scope: "@bmmaral"

      - name: Publish to GitHub Packages
        working-directory: packaging/npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish
