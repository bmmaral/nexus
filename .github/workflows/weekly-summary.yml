name: Weekly Summary

on:
  schedule:
    - cron: "0 8 * * MON"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate weekly summary
        id: gen
        run: |
          START=$(date -d 'last monday' +%Y-%m-%d)
          END=$(date +%Y-%m-%d)
          echo "# Weekly Summary ($START to $END)" > weekly-summary.md
          echo "\n## Commits" >> weekly-summary.md
          git log --since="$START" --until="$END" --pretty='- %ad %h %an: %s' --date=short >> weekly-summary.md
          echo "\n## Conversations" >> weekly-summary.md
          ls -1 conversations 2>/dev/null | sed 's/^/- /' >> weekly-summary.md || true
          echo "\n## Drift Status" >> weekly-summary.md
          if [ -f reports/drift.md ]; then
            echo "Existing drift report found:" >> weekly-summary.md
            echo "\n" >> weekly-summary.md
            tail -n +1 reports/drift.md | head -n 100 >> weekly-summary.md
          else
            echo "No drift report found. Run nexus analyze." >> weekly-summary.md
          fi

      - name: Commit summary
        run: |
          mkdir -p reports
          mv weekly-summary.md reports/weekly-summary.md
          if [ -n "$(git status --porcelain reports/weekly-summary.md)" ]; then
            git config user.name "Nexus Bot"
            git config user.email "nexus@local"
            git add reports/weekly-summary.md
            git commit -m "auto: Weekly project summary"
            git push
          fi

      - name: Create summary issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('reports/weekly-summary.md', 'utf8');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '📊 Weekly Project Summary',
              body,
              labels: ['summary','automated']
            });
