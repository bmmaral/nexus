name: Nexus CI

on:
  push:
    branches: ["**"]
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch: {}

jobs:
  ai_analysis:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' # Only run on push events
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .
      - name: Run AI analysis
        id: analysis
        run: |
          analysis_output=$(nexus analyze HEAD~1..HEAD)
          echo "analysis_output<<EOF" >> $GITHUB_OUTPUT
          echo "$analysis_output" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_KEY }}
      - name: Post analysis as a commit comment
        uses: actions/github-script@v7
        if: success()
        with:
          script: |
            const output = `${{ steps.analysis.outputs.analysis_output }}`;
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `### 🤖 Nexus AI Analysis\n\n${output}`
            });

  remind:
    runs-on: ubuntu-latest
    if: github.event_name != 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .
      - name: Check inactivity
        id: inactivity
        run: |
          OUT=$(nexus check || true)
          echo "$OUT" > inactivity.json
          echo "json<<EOF" >> $GITHUB_OUTPUT
          echo "$OUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Create reminder issue if inactive
        if: contains(steps.inactivity.outputs.json, '"inactive": true')
        uses: actions/github-script@v7
        with:
          script: |
            const data = JSON.parse(process.env.JSON);
            const days = data.days;
            const next = data.next_steps || 'No next steps defined';
            const last = (data.last_commit || '').split('\n')[0];
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'reminder'
            });
            if (issues.length > 0) { return; }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⏰ Project inactive for ${days} days`,
              body: `### Project Activity Reminder\n\n- Last commit: ${last}\n- Days inactive: ${days}\n\n#### Next Steps\n${next}\n\nRun locally:\n\n\`\`\`bash\n# Status\nnexus status\n# Analyze\nnexus analyze\n# Timeline\nnexus timeline\n\`\`\``,
              labels: ['reminder','automated']
            });
          env:
            JSON: ${{ steps.inactivity.outputs.json }}
