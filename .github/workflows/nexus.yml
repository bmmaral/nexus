name: Nexus MVP Pipeline

on:
  push:
    branches: ["**"]
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch: {}

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run analyzer
        run: |
          python nexus.py analyze
      - name: Commit drift report if changed
        run: |
          git config user.name "Nexus Bot"
          git config user.email "nexus@bot.local"
          if [ -n "$(git status --porcelain reports/drift.md)" ]; then
            git add reports/drift.md
            git commit -m "auto(analyzer): update drift report"
            git push || true
          fi

  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Check inactivity
        id: inactivity
        run: |
          OUT=$(python nexus.py check || true)
          echo "$OUT" > inactivity.json
          echo "json<<EOF" >> $GITHUB_OUTPUT
          echo "$OUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Create reminder issue if inactive
        # Whole `if` must be YAML-single-quoted so ':' inside the needle does not start a new mapping.
        if: '${{ contains(steps.inactivity.outputs.json, ''"inactive": true'') }}'
        uses: actions/github-script@v7
        env:
          JSON: ${{ steps.inactivity.outputs.json }}
        with:
          script: |
            const data = JSON.parse(process.env.JSON);
            const days = data.days;
            const next = data.next_steps || 'No next steps defined';
            const last = (data.last_commit || '').split('\n')[0];
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'reminder'
            });
            if (issues.length > 0) { return; }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⏰ Project inactive for ${days} days`,
              body: `### Project Activity Reminder\n\n- Last commit: ${last}\n- Days inactive: ${days}\n\n#### Next Steps\n${next}\n\nRun locally:\n\n\`\`\`bash\n# Status\nnexus status\n# Analyze\nnexus analyze\n# Timeline\nnexus timeline\n\`\`\``,
              labels: ['reminder','automated']
            });
