name: Nightly Health Check
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Quick analyze (optional)
        run: |
          pip install click gitpython pyyaml >/dev/null
          echo "#!/usr/bin/env python3" | sudo tee /usr/local/bin/nexus > /dev/null
          cat nexus.py | sudo tee -a /usr/local/bin/nexus > /dev/null
          sudo chmod +x /usr/local/bin/nexus
          nexus analyze || true

      - name: Open issue if drift found
        run: |
          if grep -q "🔴" reports/drift.md 2>/dev/null; then
            echo "DRIFT=1" >> $GITHUB_ENV
          fi

      - name: Create drift summary issue
        if: env.DRIFT == '1'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('reports/drift.md', 'utf8').slice(0, 6000);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🟠 Nightly Health: Drift detected',
              body,
              labels: ['drift','automated']
            });
