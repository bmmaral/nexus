name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  linux-musl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install musl toolchain
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - run: rustup target add x86_64-unknown-linux-musl

      - name: Build static CLI (musl)
        env:
          CC: x86_64-linux-musl-gcc
        run: cargo build --release --target x86_64-unknown-linux-musl -p gittriage-cli

      - name: Stage artifacts
        run: |
          BIN=target/x86_64-unknown-linux-musl/release/gittriage
          cp "$BIN" "gittriage-${GITHUB_REF_NAME}-x86_64-unknown-linux-musl"
          sha256sum "gittriage-${GITHUB_REF_NAME}-x86_64-unknown-linux-musl" | awk '{print $1}' > "gittriage-${GITHUB_REF_NAME}-x86_64-unknown-linux-musl.sha256"

          for sh in bash zsh fish; do
            "$BIN" completions "$sh" > "gittriage.${sh}"
          done
          tar czf "gittriage-${GITHUB_REF_NAME}-completions.tar.gz" gittriage.bash gittriage.zsh gittriage.fish

      - name: Upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            gittriage-${{ github.ref_name }}-x86_64-unknown-linux-musl
            gittriage-${{ github.ref_name }}-x86_64-unknown-linux-musl.sha256
            gittriage-${{ github.ref_name }}-completions.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  macos:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-apple-darwin
            runner: macos-13
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build CLI
        run: cargo build --release -p gittriage-cli

      - name: Stage artifact
        run: |
          cp target/release/gittriage "gittriage-${GITHUB_REF_NAME}-${{ matrix.target }}"
          shasum -a 256 "gittriage-${GITHUB_REF_NAME}-${{ matrix.target }}" | awk '{print $1}' > "gittriage-${GITHUB_REF_NAME}-${{ matrix.target }}.sha256"

      - name: Upload artifact
        uses: softprops/action-gh-release@v2
        with:
          files: |
            gittriage-${{ github.ref_name }}-${{ matrix.target }}
            gittriage-${{ github.ref_name }}-${{ matrix.target }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build CLI
        run: cargo build --release -p gittriage-cli

      - name: Stage artifact
        shell: bash
        run: |
          cp target/release/gittriage.exe "gittriage-${GITHUB_REF_NAME}-x86_64-pc-windows-msvc.exe"
          sha256sum "gittriage-${GITHUB_REF_NAME}-x86_64-pc-windows-msvc.exe" | awk '{print $1}' > "gittriage-${GITHUB_REF_NAME}-x86_64-pc-windows-msvc.exe.sha256"

      - name: Upload artifact
        uses: softprops/action-gh-release@v2
        with:
          files: |
            gittriage-${{ github.ref_name }}-x86_64-pc-windows-msvc.exe
            gittriage-${{ github.ref_name }}-x86_64-pc-windows-msvc.exe.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
