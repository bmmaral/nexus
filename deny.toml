# https://embarkstudios.github.io/cargo-deny/
[advisories]
version = 2
yanked = "deny"

[bans]
multiple-versions = "warn"

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "MPL-2.0",
    "OpenSSL",
    "CC0-1.0",
    "Unlicense",
]

[sources]
unknown-registry = "deny"
unknown-git = "warn"
